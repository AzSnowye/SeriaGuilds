  # => %thisversion% = Versi yang terpasang
  update-available: "&9Versi baru Parties ditemukan: %version% (Saat ini: %thisversion%)"
  # [Special tags]
  # => %config%      = Nama file konfigurasi yang usang
  configuration-outdated: "&cFile konfigurasi '%config%' dari Parties sudah usang!"

  common-messages:
