    disabled: '&cNonaktif'
    toggled-on: '&aHidup'
    toggled-off: '&cMati'
    word-yes: '&aYa'
    word-no: '&cTidak'
    empty: '&8Kosong'
    none: '&8Tidak Ada'

  syntax:
    wrong-message: '&cSintaks salah: Ketik &7/%syntax%'
    color: 'color'
    description: 'desc'
    experience: 'experience'
    kills: 'kills'
    home: 'home'
    members: 'members'
    message: 'message'
    motd: 'motd'
    name: 'name'
    nickname: 'nickname'
    online-members: 'online_members'
    order: 'order'
    page: 'page'
    party: 'guild'
    password: 'password'
    permission: 'permission'
    player: 'player'
    rank: 'rank'
    tag: 'tag'

  permissions:
    # [Special tags]
    # => %permission%  = Permission yang hilang
    no-permission: "&cAnda tidak memiliki akses ke perintah ini"
    no-permission-in-party-general: "&cRank guild Anda tidak memiliki akses ke perintah ini"
    no-permission-in-party-rank: "&cAnda perlu menjadi %rank_name% untuk melakukan perintah ini"

  out-party: "Luar Guild"

  list:
    player-online-format: "&b%player%"
    player-offline-format: "&7%player%"
    player-separator: "&7, "
    player-empty: "&7Tidak Ada Orang"
    player-unknown: "&6Seseorang"
